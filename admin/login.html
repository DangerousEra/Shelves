<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — SHELVES</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Anton&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../favicon.png">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --yellow: #FFE600;
  --red:    #FF2200;
  --blue:   #1A1AFF;
  --white:  #F5F0E8;
  --black:  #0A0A0A;
  --green:  #00FF41;
  --orange: #FF6B00;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── MICRO FLICKER ── */
.flicker-overlay {
  position: fixed; inset: 0;
  z-index: 9999; pointer-events: none;
  opacity: 0; background: var(--white);
  will-change: opacity;
  animation: microFlicker 8s linear infinite;
}
@keyframes microFlicker {
  0%,5.90%,6.10%,23.90%,24.10%,47.90%,48.10%,71.90%,72.10%,89.90%,90.10%,100% { opacity: 0; }
  6.00%  { opacity: 0.04; }
  24.00% { opacity: 0.03; }
  48.00% { opacity: 0.05; }
  72.00% { opacity: 0.03; }
  90.00% { opacity: 0.04; }
}

/* ── NOISE ── */
.noise {
  position: fixed; inset: 0; z-index: 998; pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
  will-change: background-position;
  animation: noiseAnim 0.5s steps(3) infinite;
}
@keyframes noiseAnim {
  0%   { background-position: 0 0; }
  33%  { background-position: 60px 90px; }
  66%  { background-position: 110px 40px; }
  100% { background-position: 0 0; }
}

/* ── SCANLINES ── */
.scanlines {
  position: fixed; inset: 0; z-index: 997; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.022) 2px, rgba(0,0,0,0.022) 4px);
}

/* ── LOGIN CONTAINER ── */
.login-container {
  position: relative;
  z-index: 100;
  width: 100%;
  max-width: 440px;
  padding: 40px;
  background: linear-gradient(135deg, rgba(26,26,26,0.95) 0%, rgba(10,10,10,0.98) 100%);
  border: 2px solid rgba(245,240,232,0.1);
  border-radius: 12px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-align: center;
  transform: translateY(20px);
  opacity: 0;
  animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
.login-container::before {
  content: '';
  position: absolute; top: -2px; left: -2px; right: -2px; height: 4px;
  background: linear-gradient(90deg, var(--red), var(--yellow), var(--blue));
  border-radius: 12px 12px 0 0;
}

@keyframes slideUp {
  to { transform: translateY(0); opacity: 1; }
}

.admin-logo {
  font-family: 'Black Ops One', cursive;
  font-size: 3rem;
  letter-spacing: 0.05em;
  color: var(--white);
  text-decoration: none;
  display: block;
  margin-bottom: 8px;
}
.admin-logo span { color: var(--yellow); }

.admin-badge {
  display: inline-block;
  font-size: 0.7rem; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red);
  background: rgba(255,34,0,0.1);
  padding: 6px 12px;
  border-radius: 4px;
  margin-bottom: 40px;
}

.form-group {
  margin-bottom: 24px;
  text-align: left;
}
.form-label {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.6);
  margin-bottom: 10px;
}
.form-input {
  width: 100%;
  background: rgba(245,240,232,0.05);
  border: 2px solid rgba(245,240,232,0.2);
  color: var(--white);
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  padding: 14px 18px;
  outline: none;
  transition: all 0.3s;
  border-radius: 6px;
}
.form-input:focus {
  border-color: var(--yellow);
  background: rgba(245,240,232,0.08);
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.1);
}
.form-input::placeholder {
  color: rgba(245,240,232,0.3);
}

.login-btn {
  width: 100%;
  background: var(--yellow);
  color: var(--black);
  font-family: 'Black Ops One', cursive;
  font-size: 1.1rem;
  padding: 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 10px;
}
.login-btn:hover {
  background: var(--red);
  color: var(--white);
  transform: scale(1.02);
}
.login-btn:active {
  transform: scale(0.98);
}

.error-msg {
  color: var(--red);
  font-size: 0.75rem;
  margin-top: 12px;
  min-height: 18px;
  opacity: 0;
  transition: opacity 0.3s;
}
.error-msg.show {
  opacity: 1;
}

.back-link {
  display: inline-block;
  margin-top: 24px;
  font-size: 0.7rem;
  color: rgba(245,240,232,0.4);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: color 0.2s;
}
.back-link:hover {
  color: var(--white);
}

/* Decorative background shapes */
.bg-shape {
  position: absolute;
  filter: blur(60px);
  z-index: 1;
  opacity: 0.3;
  pointer-events: none;
}
.bg-shape.yellow {
  background: var(--yellow);
  width: 300px; height: 300px;
  border-radius: 50%;
  top: -100px; left: -100px;
}
.bg-shape.red {
  background: var(--red);
  width: 400px; height: 400px;
  border-radius: 50%;
  bottom: -150px; right: -100px;
}
.bg-shape.blue {
  background: var(--blue);
  width: 250px; height: 250px;
  border-radius: 50%;
  top: 40%; left: 60%;
}
</style>
</head>
<body>

<div class="flicker-overlay" aria-hidden="true"></div>
<div class="noise"></div>
<div class="scanlines"></div>

<div class="bg-shape yellow"></div>
<div class="bg-shape red"></div>
<div class="bg-shape blue"></div>

<div class="login-container">
  <div class="admin-logo">SHELVES<span>.</span></div>
  <div class="admin-badge">Admin System Portal</div>
  
  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Access Code</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="Enter admin password" autocomplete="off" autofocus>
    </div>
    
    <button type="submit" class="login-btn">Authenticate</button>
    <div class="error-msg" id="errorMsg">Access Denied. Invalid Code.</div>
  </form>
  
  <a href="../index.html" class="back-link">← Return to Public Site</a>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const password = document.getElementById('passwordInput').value;
    const errorMsg = document.getElementById('errorMsg');
    
    // Simple frontend simulated authentication
    if (password === 'admin123') {
      errorMsg.classList.remove('show');
      sessionStorage.setItem('isAdminLoggedIn', 'true');
      
      // Add a cool glitch effect before redirecting
      document.querySelector('.login-container').style.animation = 'glitchLogo 0.3s infinite';
      document.body.style.background = 'var(--white)';
      document.body.style.filter = 'invert(1)';
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 600);
    } else {
      errorMsg.classList.add('show');
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
      
      // Shake animation
      const container = document.querySelector('.login-container');
      container.style.transform = 'translateX(-10px)';
      setTimeout(() => container.style.transform = 'translateX(10px)', 50);
      setTimeout(() => container.style.transform = 'translateX(-10px)', 100);
      setTimeout(() => container.style.transform = 'translateX(10px)', 150);
      setTimeout(() => container.style.transform = 'translateY(0)', 200);
    }
  });

  // Check if already logged in
  if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
